# PulseBrief settings

# Predefined briefs — each has a fixed anchor time and looks back to the previous preset
# morning covers since yesterday's evening (07:00 - 18:00 yesterday = last ~13h)
# afternoon covers since morning (13:00 - 07:00 = last 6h)
# evening covers since afternoon (18:00 - 13:00 = last 5h)
briefs:
  morning:
    anchor: "07:00"
    since: "evening"     # since yesterday's evening anchor
  afternoon:
    anchor: "13:00"
    since: "morning"     # since today's morning anchor
  evening:
    anchor: "18:00"
    since: "afternoon"   # since today's afternoon anchor

ai:
  model: "claude-sonnet-4-20250514"
  max_items_per_brief: 10

delivery:
  channels:
    - type: file
      path: "data/briefs"

    - type: resend
      from: "Pulse Brief <pulse@pulsebrief.me>"
      to:
       - "jonas@kjellin.com"
       - "jonas.kjellin@hm.com"

