# PulseBrief settings

timezone: "Europe/Stockholm"

# Predefined briefs — all times are in the timezone above
briefs:
  morning:
    anchor: "07:00"
    since: "evening"     # since yesterday's evening anchor
  afternoon:
    anchor: "13:00"
    since: "morning"     # since today's morning anchor
  evening:
    anchor: "18:00"
    since: "afternoon"   # since today's afternoon anchor

ai:
  model: "claude-sonnet-4-20250514"
  max_items_per_brief: 10

delivery:
  channels:
    - type: file
      path: "data/briefs"

    - type: resend
      from: "Pulse Brief <pulse@pulsebrief.me>"
      to:
       - "jonas@kjellin.com"
       - "jonas.kjellin@hm.com"

